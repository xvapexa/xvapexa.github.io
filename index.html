<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaPeX Hosting | Free Minecraft Servers</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden; /* იკეტება სქროლი ლოგინამდე */
        }

        /* Login Overlay */
        #authOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #020617;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: #0f172a;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #22c55e;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.1);
        }

        .auth-card h2 { color: #22c55e; margin-bottom: 25px; }

        .auth-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #1e293b;
            background: #020617;
            color: white;
            box-sizing: border-box;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: #020617;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-btn:hover { background: #16a34a; }

        .switch-auth {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
        }

        /* Main Content (დამალულია თავიდან) */
        #mainContent { display: none; }

        header {
            background: #020617;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
        }

        .logo { font-size: 26px; font-weight: bold; color: #22c55e; letter-spacing: 1px; }

        nav a { color: #94a3b8; text-decoration: none; margin-left: 25px; transition: 0.3s; }
        nav a:hover { color: #22c55e; }

        .hero { text-align: center; padding: 120px 20px; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        .hero h1 { font-size: 55px; margin-bottom: 10px; }
        
        .button {
            display: inline-block; background: #22c55e; padding: 18px 45px; border-radius: 10px;
            text-decoration: none; color: #020617; font-weight: bold; cursor: pointer; border: none;
        }

        .servers { display: flex; justify-content: center; gap: 40px; padding: 80px 20px; }
        .card { background: #020617; padding: 40px; border-radius: 15px; width: 280px; text-align: center; border: 1px solid #1e293b; }

        /* Order Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: #020617; margin: 10% auto; padding: 40px; border: 1px solid #22c55e; width: 350px; border-radius: 20px; text-align: center; position: relative; }
        .select-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 15px; width: 100%; margin-top: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card" id="loginBox">
        <h2>Login to VaPeX</h2>
        <input type="text" id="logUser" placeholder="Username">
        <input type="password" id="logPass" placeholder="Password">
        <button class="auth-btn" onclick="handleAuth()">Login</button>
        <p class="switch-auth" onclick="toggleAuth()">Don't have an account? Register</p>
    </div>

    <div class="auth-card" id="registerBox" style="display:none;">
        <h2>Register</h2>
        <input type="text" id="regUser" placeholder="Choose Username">
        <input type="email" id="regEmail" placeholder="Email Address">
        <input type="password" id="regPass" placeholder="Create Password">
        <button class="auth-btn" onclick="handleAuth()">Create Account</button>
        <p class="switch-auth" onclick="toggleAuth()">Already have an account? Login</p>
    </div>
</div>

<div id="mainContent">
    <header>
        <div class="logo">VaPeX</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Servers</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Free Minecraft Hosting</h1>
        <p>High performance nodes for your community.</p>
        <button class="button" onclick="openModal()">Create Server</button>
    </section>

    <section class="servers">
        <div class="card">
            <h2>Free Plan</h2>
            <p style="color:#22c55e; font-size: 24px;">0$</p>
            <p>2GB RAM</p>
        </div>
        <div class="card">
            <h2>Pro Plan</h2>
            <p style="color:#22c55e; font-size: 24px;">Premium</p>
            <p>6GB RAM</p>
        </div>
    </section>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:10px; cursor:pointer;" onclick="closeModal()">&times;</span>
        <div id="step1">
            <h3>Select Location</h3>
            <button class="select-btn" onclick="nextStep('Europe')">Europe</button>
            <button class="select-btn" onclick="nextStep('USA')">USA</button>
        </div>
        <div id="step2" style="display:none;">
            <h3>Select Plan</h3>
            <button class="select-btn" onclick="finishOrder('Free')">Free (2GB)</button>
            <button class="select-btn" onclick="finishOrder('Pro')">Pro (6GB)</button>
        </div>
    </div>
</div>

<script>
    // Auth Logic
    function toggleAuth() {
        const login = document.getElementById('loginBox');
        const register = document.getElementById('registerBox');
        if (login.style.display === 'none') {
            login.style.display = 'block';
            register.style.display = 'none';
        } else {
            login.style.display = 'none';
            register.style.display = 'block';
        }
    }

    function handleAuth() {
        // ამ ეტაპზე ნებისმიერი შესვლა მუშაობს
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.body.style.overflow = 'auto';
    }

    function logout() {
        location.reload();
    }

    // Order Logic
    let userLoc = "";
    function openModal() { document.getElementById("orderModal").style.display = "block"; }
    function closeModal() { document.getElementById("orderModal").style.display = "none"; }
    function nextStep(l) { 
        userLoc = l;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
    }
    function finishOrder(p) {
        alert("Server request sent!\nLocation: " + userLoc + "\nPlan: " + p);
        closeModal();
    }
</script>

</body>
</html>
